output_root: "${CALYX_HOME}/lenses"
models:
  - name: semantic-bge-small-en-v1-5
    hf_id: Xenova/bge-small-en-v1.5
    modality: text
    formats: [onnx-int8]
    pooling: mean
    norm: l2

  - name: semantic-potion-base-8m
    hf_id: minishlab/potion-base-8M
    modality: text
    formats: [model2vec]
    pooling: mean
    norm: l2
    dtype: int8

  - name: domain-scibert-scivocab-uncased
    hf_id: Xenova/scibert_scivocab_uncased
    modality: text
    formats: [onnx-int8]
    pooling: mean
    norm: l2

  - name: audio-wav2vec2-base-960h
    hf_id: Xenova/wav2vec2-base-960h
    modality: audio
    formats: [onnx-int8]
    pooling: mean
    norm: finite
